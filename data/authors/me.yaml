bio: |
  The SAJJAD Lab (Spatial Analytics for Joint Forecasting & Adaptive-Disaster Resilience Lab) is devoted to advancing integrative geospatial science through persistent innovation in analytics and data science. 
  We are committed to mapping environmental risks, modeling complex human-environment systems, and co-creating pathways for adaptation and resilience.
  The Lab is led by Dr. SAJJAD Muhammad, a Research Assistant Professor at The Chinese University of Hong Kong, HKSAR. The Lab has produced over 40+ peer reviewed papers, several conferences,
  and notable book chapters. Our work has 1800+ citations with an H-index of 26 andan i-10 Index of 29 as of December 2025.

